apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-new
  namespace: wordpress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress-new
  template:
    metadata:
      labels:
        app: wordpress-new
    spec:
#      affinity:
#        nodeAffinity:
#          requiredDuringSchedulingIgnoredDuringExecution:
#            nodeSelectorTerms:
#            - matchExpressions:
#              - key: topology.kubernetes.io/zone
#                operator: In
#                values:
#                - asia-southeast1-c
      securityContext:
        fsGroup: 33
      containers:
      - name: wordpress
        image: wordpress:6.9.4-php8.2-apache
        ports:
        - containerPort: 80

        env:
        - name: WORDPRESS_DB_HOST
          value: mariadb-stanalone-svc 
        - name: WORDPRESS_DB_NAME
          valueFrom:
            secretKeyRef:
              name: wp-secret-new
              key: WORDPRESS_DB_NAME
        - name: WORDPRESS_DB_USER
          valueFrom:
            secretKeyRef:
              name: wp-secret-new
              key: WORDPRESS_DB_USER
        - name: WORDPRESS_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wp-secret-new
              key: WORDPRESS_DB_PASSWORD

        resources:
          requests:
            cpu: 300m
            memory: 512Mi
          limits:
            cpu: 1
            memory: 1Gi

        volumeMounts:
        - name: wp-content
          mountPath: /var/www/html/wp-content

#        readinessProbe:
#          httpGet:
#            path: /wp-login.php
#            port: 80
#          initialDelaySeconds: 20
#          periodSeconds: 10
#
#        livenessProbe:
#          httpGet:
#            path: /
#            port: 80
#          initialDelaySeconds: 60
#          periodSeconds: 20

      volumes:
      - name: wp-content
        persistentVolumeClaim:
          claimName: wp-content-pvc

---

apiVersion: v1
kind: Service
metadata:
  name: wordpress-new-svc
  namespace: wordpress
spec:
  type: ClusterIP
  selector:
    app: wordpress-new
  ports:
  - port: 80
    targetPort: 80

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wp-content-pvc
  namespace: wordpress
spec:
  storageClassName: standard-rwo
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi